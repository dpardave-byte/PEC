<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PEC</title><style>body{margin:0;font-family:Arial,sans-serif;background:#f6f7f9;color:#1f2937}.wrap{max-width:1180px;margin:24px auto;background:#fff;border:1px solid #ddd;border-radius:10px;overflow:hidden}header{background:#1a3a5c;color:white;padding:18px 22px}.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:14px}.kpi{background:#f0f3f7;border-radius:8px;text-align:center;padding:14px}.kpi b{font-size:28px}.tools{display:flex;gap:8px;flex-wrap:wrap;padding:8px 14px}.tools input,.tools select{height:32px;border:1px solid #ccd3dd;border-radius:8px;padding:0 8px}button{height:32px;border:0;background:#185fa5;color:white;border-radius:8px;padding:0 12px}.main{padding:14px}.box{overflow:auto;border:1px solid #ddd;border-radius:8px}table{width:100%;min-width:920px;border-collapse:collapse;font-size:12px}th,td{padding:9px;border-bottom:1px solid #e5e7eb;text-align:left}th{background:#f0f3f7;position:sticky;top:0}.tag{border-radius:999px;padding:3px 8px;font-weight:bold;font-size:11px}.ok{background:#eaf3de;color:#3b6d11}.proc{background:#e6f1fb;color:#185fa5}.pend{background:#f1efe8;color:#5f5e5a}.risk{background:#fcebeb;color:#a32d2d}.warn{background:#faeeda;color:#854f0b}.hito{background:#fbeaf0;color:#993556}.small{font-size:11px;color:#667085}.bar{height:8px;background:#e5e7eb;border-radius:8px;overflow:hidden;width:90px}.bar i{display:block;height:100%;background:#185fa5}@media(max-width:800px){.kpis{grid-template-columns:1fr}.wrap{margin:0;border-radius:0}}</style></head><body><div class="wrap"><header><h2>Panel de Alerta - Programa de Economia Circular</h2><p>Donacion, efectividad del prestamo e inicio formal del programa en Puno y Lima - Corte: 10/04/2026</p></header><div id="kpis" class="kpis"></div><div class="tools"><input id="q" placeholder="Buscar"><select id="estado"><option value="">Todos</option><option>Completado</option><option>En Proceso</option><option>Pendiente de Iniciar</option></select><input id="file" type="file" accept=".csv,.json"><input id="url" style="width:min(460px,100%)" placeholder="URL publica CSV/JSON"><button id="load">Actualizar</button><span id="status" class="small">Datos internos cargados</span></div><main class="main"><div class="box"><table><thead><tr><th>EDT</th><th>Actividad</th><th>Responsable</th><th>Inicio</th><th>Fin</th><th>Dur.</th><th>Avance</th><th>Estado</th><th>Alerta</th></tr></thead><tbody id="tb"></tbody></table></div></main></div><script>const DATA=[['0','Donacion / fase preparatoria previa al prestamo','DGPPCS/BM/PNSU/PASLC','2026-03-07','2026-06-17',103,'En Proceso','Condicion habilitante para iniciar el prestamo y el programa en Puno y Lima'],['0.1','Actividades preparatorias vinculadas a la donacion: MOP, convenios, equipos, PTAR Puno, UGP-PEC y sistema de seguimiento','DGPPCS/BM/PNSU/PASLC','2026-03-07','2026-06-17',103,'En Proceso','Agrupa preparacion y efectividad'],['1','DS de aprobacion de endeudamiento','-','2026-03-07','2026-03-07',1,'Completado',''],['1.1','Firma del Contrato de prestamo','-','2026-03-07','2026-03-20',14,'Completado',''],['2','Cumplimiento de condiciones de efectividad del prestamo','-','2026-03-20','2026-06-17',90,'En Proceso','Sandra Torres / Cesar Fabian'],['2.1','Aprobacion de Manual de Operaciones (MOP) de la UGP','DGPPCS','2026-03-20','2026-06-17',90,'En Proceso','Betsabe Araindia / Sandra Torres'],['2.2','Suscripcion de convenios interinstitucionales','PNSU/PASLC','2026-03-09','2026-05-20',73,'En Proceso','Carlos Portocarrero / Fredy Ruiz'],['2.2.1','Convenio de cooperacion Puno (PNSU)','PNSU','2026-03-09','2026-05-20',73,'Completado',''],['2.2.2','Convenio Lima (PASLC)','PASLC','2026-03-09','2026-05-20',73,'En Proceso',''],['2.3','Conformacion equipo clave','PNSU/PASLC/DGPPCS','2026-03-14','2026-04-24',42,'En Proceso','Betsabe Araindia / Sandra Torres'],['2.4','Evaluacion de la Intervencion en las Lagunas de la PTAR Puno','-','2026-04-13','2026-04-22',10,'En Proceso','Teresa Arana'],['2.5','Creacion de Unidad de Gestion del Programa - UGP-PEC','-','2026-04-13','2026-05-21',39,'Pendiente de Iniciar','Sandra Torres'],['2.6','Aprobacion de la RM de Creacion de la UGP-PEC','DGPPCS/VMCS/OGPP/OGAJ/SG','2026-04-13','2026-05-07',25,'Pendiente de Iniciar',''],['2.7','Elaboracion del Sistema de Seguimiento','-','2026-04-06','2026-04-10',5,'En Proceso','Alain Sanchez'],['3','Prestamo e inicio formal del Programa de Economia Circular en Puno y Lima','DGPPCS/BM','2026-06-17','2026-06-17',1,'','Se activa cuando se cumple la fase previa']].map(a=>({edt:a[0],actividad:a[1],responsable:a[2],inicio:a[3],final:a[4],duracion:a[5],estado:a[6],resp_seg:a[7]}));let rows=DATA;const T=new Date('2026-04-10'),MS=86400000,$=id=>document.getElementById(id);function al(d){if(!d.estado)return['Hito','hito'];if(d.estado==='Completado')return['OK','ok'];let f=(new Date(d.final)-T)/MS,i=(new Date(d.inicio)-T)/MS;if(d.estado==='En Proceso')return f<0?['Vencido','risk']:f<=7?['Por vencer','warn']:['En tiempo','proc'];if(d.estado==='Pendiente de Iniciar')return i<0?['Inicio atrasado','risk']:['Pendiente','pend'];return['-','pend']}function pct(d){if(!d.estado)return 0;if(d.estado==='Completado')return 100;if(d.estado==='Pendiente de Iniciar')return 0;let p=Math.round((T-new Date(d.inicio))/(new Date(d.final)-new Date(d.inicio))*100);return Math.max(0,Math.min(99,isFinite(p)?p:50))}function draw(){let q=$('q').value.toLowerCase(),e=$('estado').value,rs=rows.filter(r=>(!q||JSON.stringify(r).toLowerCase().includes(q))&&(!e||r.estado===e));$('tb').innerHTML=rs.map(r=>{let a=al(r),p=pct(r);return `<tr><td>${r.edt}</td><td>${r.actividad}<br><span class=small>${r.resp_seg||''}</span></td><td>${r.responsable}</td><td>${r.inicio}</td><td>${r.final}</td><td>${r.duracion}d</td><td><div class=bar><i style="width:${p}%"></i></div><span class=small>${p}%</span></td><td><span class="tag ${r.estado==='Completado'?'ok':r.estado==='En Proceso'?'proc':r.estado?'pend':'hito'}">${r.estado||'Hito'}</span></td><td><span class="tag ${a[1]}">${a[0]}</span></td></tr>`}).join('');let t=rows.filter(r=>r.estado).length,c=rows.filter(r=>r.estado==='Completado').length,p=rows.filter(r=>r.estado==='En Proceso').length,n=rows.filter(r=>r.estado==='Pendiente de Iniciar').length,v=rows.filter(r=>al(r)[1]==='risk').length;$('kpis').innerHTML=[['Total',t],['Completado',c],['En Proceso',p],['Pendiente',n],['Riesgo',v]].map((x,i)=>`<div class=kpi><span class=small>${x[0]}</span><br><b>${x[1]}</b></div>`).join('')}function norm(o){return{edt:o.edt||o.EDT||'',actividad:o.actividad||o.Actividad||'',responsable:o.responsable||o.Responsable||'-',inicio:o.inicio||o.Inicio||'',final:o.final||o.fin||o.Final||o.Fin||'',duracion:o.duracion||o.Duracion||0,estado:o.estado||o.Estado||'',resp_seg:o.resp_seg||o.Seguimiento||''}}function csv(t){let l=t.trim().split(/\r?\n/),h=l.shift().split(',');return l.map(x=>norm(Object.fromEntries(x.split(',').map((v,i)=>[h[i],v]))))}function use(t,n){rows=t.trim()[0]==='['?JSON.parse(t).map(norm):csv(t);$('status').textContent=`Fuente activa: ${n} (${rows.length} filas)`;draw()}$('q').oninput=draw;$('estado').oninput=draw;$('file').onchange=e=>{let f=e.target.files[0],r=new FileReader();r.onload=()=>use(r.result,f.name);r.readAsText(f)};$('load').onclick=async()=>{let u=$('url').value.trim();if(!u)return;try{let r=await fetch(u);use(await r.text(),'URL')}catch(e){$('status').textContent='Error al cargar URL: '+e.message}};draw()</script></body></html>
